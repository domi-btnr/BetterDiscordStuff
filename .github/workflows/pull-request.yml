name: Pull Request
on: 
    pull_request

jobs:
  eslint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --include-dev
      - name: Run ESLint
        run: npx eslint

  prettier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --include-dev
      - name: Run Prettier
        run: npx prettier --check .
  
  build-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --include-dev
      - name: Get changed files
        id: changed-files
        run: |
          files=$(git diff --name-only --diff-filter=AM origin/${{ github.base_ref }}...HEAD | tr '\n' ' ')
          echo "changed_files=$files" >> $GITHUB_OUTPUT
      - name: Build plugins
        run: |
          npm run build -- --plugins ${{ steps.changed-files.outputs.changed_files }}