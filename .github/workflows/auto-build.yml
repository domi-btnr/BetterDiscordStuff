name: Autobuild Plugins

on:
  push:
    branches:
      - development
  workflow_dispatch:
    inputs:
      plugin:
        description: What plugin to build. Omit for all.
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Plugins
    runs-on: ubuntu-latest
    steps:
      - name: Clean working directory
        run: rm -rf /home/runner/work/${{ github.repository }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 22
          cache: true
          run_install: true

      - name: Get changed files
        id: changed-files
        run: |
          files=$(git diff --name-only --diff-filter=AM origin/${{ github.base_ref }}...HEAD | tr '\n' ' ')
          echo "changed_files=$files" >> $GITHUB_OUTPUT

      - name: Build plugins
        run: >-
          npm run build --
          --publish
          --plugins ${{ github.event.inputs.plugin }}
          ${{ steps.changed-files.outputs.changed_files }}
          && if [ ! -d builds ]; then echo "noBuildFolder=true" >> $GITHUB_ENV; fi

      - name: Cancel Job when no Artifact
        if: "env.noBuildFolder == 'true'"
        uses: andymckay/cancel-action@0.5

      - name: Stage build
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: builds
          retention-days: 1

  publish:
    name: Publish plugins
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Restore repo
        uses: actions/checkout@v6
        with:
          ref: main
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Apply build
        uses: actions/download-artifact@v4
        with:
          name: build-artifact

      - name: Commit Changes
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          git config advice.addIgnoredFile false
          git add --no-all ./**
          git config --local user.email "actions@github.com"
          git config --local user.name "PluginBuilder"
          git commit -F <(printf "%s" "$COMMIT_MSG")
          git push
